<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title id="page-title"></title>
<style>
/* ============================================================
   ★ CSS 变量
   ============================================================ */
:root {
  --gold:    #f5c842;
  --amber:   #e8973a;
  --cream:   #fff8ee;
  --rose:    #f4a1a1;
  --text:    #3a2c1a;
  --subtext: #7a5c38;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; background: #1a1020; }
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: var(--text);
  overflow-x: hidden;
  min-height: 100dvh;
}

/* ============================================================
   ★ 全局通用
   ============================================================ */
/* ── 星空画布 ── */
#stars-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ── 加载屏幕 ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #1a1020;
  transition: opacity 0.8s ease;
  gap: 1.2rem;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
#loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(245,200,66,.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: ld-spin .8s linear infinite;
}
#loading-text {
  color: rgba(255,255,255,.4);
  font-size: .88rem; letter-spacing: .15em;
}
@keyframes ld-spin { to { transform: rotate(360deg); } }

/* ── 音乐按钮 ── */
#music-btn {
  position: fixed;
  top: max(env(safe-area-inset-top),12px);
  right: max(env(safe-area-inset-right),16px);
  z-index: 50; width:40px; height:40px; border-radius:50%;
  border:1.5px solid rgba(245,200,66,.5);
  background:rgba(30,15,45,.7); backdrop-filter:blur(8px);
  cursor:pointer; display:none; align-items:center; justify-content:center;
  font-size:1.1rem; transition:border-color .3s; color:#fff;
}
#music-btn:hover{border-color:var(--gold)}
#music-btn.show{display:flex}

/* ── 主内容 ── */
#main {
  position:relative; z-index:1;
  opacity:0; transition:opacity .8s ease .3s;
  padding-bottom:6rem;
}
#main.show{opacity:1}

/* ── Section 通用 ── */
.section {
  min-height:100dvh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:3rem 1.5rem;
  padding-top:max(env(safe-area-inset-top),3rem);
  padding-bottom:max(env(safe-area-inset-bottom),3rem);
}
.section-title {
  font-size:clamp(1.1rem,4.5vw,1.5rem); font-weight:700;
  color:var(--gold); letter-spacing:.15em;
  margin-bottom:2.5rem; text-align:center;
  opacity:0; transform:translateY(20px);
  transition:opacity .6s,transform .6s;
}
.section-title.visible{opacity:1;transform:none}

/* ── 全局动画 Keyframes ── */
@keyframes fadeUp {
  from{opacity:0;transform:translateY(24px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes blink { 0%,100%{opacity:.35} 50%{opacity:.9} }
@keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes confetti-fall {
  0%  {transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(110dvh) rotate(720deg);opacity:0}
}
@keyframes glow-pulse {
  0%,100%{ text-shadow:0 0 30px rgba(245,200,66,.8),0 0 60px rgba(245,200,66,.4); }
  50%    { text-shadow:0 0 50px rgba(245,200,66,1) ,0 0 100px rgba(245,200,66,.6);}
}
@keyframes kenburns{
  0%  {transform:scale(1)   translate(0,0)}
  100%{transform:scale(1.08) translate(-1%,-1.5%)}
}

/* ============================================================
   ★ 资源加载失败降级样式
   ============================================================ */
.img-fallback {
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,248,238,.06);
  border: 1.5px dashed rgba(245,200,66,.25);
  border-radius: 12px;
  color: rgba(255,255,255,.3);
  font-size: .8rem; letter-spacing: .05em;
}
#splash-photo.img-missing {
  width: clamp(180px, 40vw, 260px); height: clamp(180px, 40vw, 260px);
  border-radius: 50%;
  background: rgba(255,248,238,.06);
  border: 3px dashed rgba(245,200,66,.25);
  box-shadow: none;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.3); font-size: .85rem;
}
.merge-img.img-missing { background: rgba(255,248,238,.06); border: 2px dashed rgba(245,200,66,.2); }
.surround-photo.img-missing { background: rgba(255,248,238,.06); border: 2px dashed rgba(245,200,66,.2); }
.film-slide .img-missing {
  max-width: 88%; max-height: 72dvh; border-radius: 12px;
  background: rgba(255,248,238,.04); border: 2px dashed rgba(245,200,66,.15);
}
#cake-img.img-missing { background: rgba(255,248,238,.06); border: 2px dashed rgba(245,200,66,.2); min-height: 200px; }
.tl-img.img-missing { min-height: 100px; background: rgba(255,248,238,.04); border: 1.5px dashed rgba(245,200,66,.15); }
#splash.bg-missing { background: radial-gradient(ellipse at 50% 60%, #2a1a3e 0%, #0e0812 100%); }

/* ============================================================
   §0 开场页
   ============================================================ */
#splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background-size: cover; background-position: center;
  background-repeat: no-repeat; background-attachment: fixed;
  cursor: pointer;
  transition: opacity 0.8s ease;
  padding: max(env(safe-area-inset-top),2rem) env(safe-area-inset-right) max(env(safe-area-inset-bottom),2rem) env(safe-area-inset-left);
  gap: 1.5rem;
}
#splash::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(10, 5, 20, 0.4); z-index: 0;
}
#splash > * { position: relative; z-index: 1; }
#splash-photo {
  width: clamp(180px, 40vw, 260px); height: clamp(180px, 40vw, 260px);
  object-fit: cover; border-radius: 50%;
  border: 3px solid rgba(245, 200, 66, 0.4);
  box-shadow: 0 0 40px rgba(245, 200, 66, 0.3), 0 8px 32px rgba(0, 0, 0, 0.5);
  opacity: 0; animation: fadeUp 1s ease 0.2s forwards;
  margin-top: -2rem;
}
#splash .splash-name {
  font-size: clamp(2rem,8vw,3.5rem); font-weight: 700; color: var(--gold);
  text-shadow: 0 0 30px rgba(245,200,66,.8), 0 0 60px rgba(245,200,66,.4);
  letter-spacing: .12em; animation: glow-pulse 2.5s ease-in-out infinite;
}
#splash .splash-sub {
  margin-top: 1rem; font-size: clamp(.9rem,3.5vw,1.2rem);
  color: rgba(255,255,255,.6); letter-spacing: .2em;
}
#splash .splash-hint {
  margin-top: 3.5rem; font-size: .85rem;
  color: rgba(255,255,255,.35); letter-spacing: .15em;
  animation: blink 1.8s ease-in-out infinite;
}
#splash.hidden { opacity: 0; pointer-events: none; }

/* §1 开场 */
#intro{background:transparent;text-align:center}
.intro-date{
  font-size:clamp(.8rem,3vw,1rem); color:var(--amber);
  letter-spacing:.2em; margin-bottom:1.2rem;
  opacity:0; animation:fadeUp .8s ease .2s forwards;
}
.intro-headline{
  font-size:clamp(2rem,9vw,3.8rem); font-weight:800; color:var(--cream); line-height:1.2;
  text-shadow:0 0 40px rgba(245,200,66,.3);
  opacity:0; animation:fadeUp .8s ease .6s forwards;
}
.intro-headline span{color:var(--gold)}
.intro-sub{
  margin-top:1.2rem; font-size:clamp(.9rem,3.5vw,1.15rem);
  color:rgba(255,255,255,.5); letter-spacing:.1em;
  opacity:0; animation:fadeUp .8s ease 1s forwards;
}
.scroll-hint{
  margin-top:3rem; color:rgba(255,255,255,.25); font-size:.8rem; letter-spacing:.15em;
  opacity:0; animation:fadeUp .8s ease 1.5s forwards,blink 2s ease 2s infinite;
}

/* §2 时间线 */
#timeline-section{padding-top:4rem;padding-bottom:4rem}
.timeline-container{width:100%;max-width:480px;position:relative}
.timeline-container::before{
  content:''; position:absolute; left:28px; top:0; bottom:0; width:2px;
  background:linear-gradient(to bottom,transparent,var(--amber),var(--gold),var(--amber),transparent);
  opacity:.4;
}
.tl-item{
  display:flex; gap:1.2rem; margin-bottom:2.5rem;
  opacity:0; transform:translateX(-24px);
  transition:opacity .6s,transform .6s;
}
.tl-item.visible{opacity:1;transform:none}
.tl-dot-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:4px}
.tl-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px rgba(245,200,66,.8);
  flex-shrink:0;margin-left:21px;
}
.tl-card{
  flex:1;background:rgba(255,248,238,.07);
  border:1px solid rgba(245,200,66,.18);border-radius:16px;
  padding:1rem 1.1rem;backdrop-filter:blur(6px);
}
.tl-date{font-size:.72rem;color:var(--amber);letter-spacing:.12em;margin-bottom:.4rem}
.tl-title{font-size:.98rem;font-weight:700;color:var(--cream);margin-bottom:.4rem}
.tl-desc{font-size:.88rem;color:rgba(255,255,255,.55);line-height:1.6}
.tl-img{
  width:100%;border-radius:10px;margin-top:.7rem;
  object-fit:cover;max-height:220px;display:block;
  border:1px solid rgba(245,200,66,.15);
}

/* §2.5 照片电影 */
#film-section{
  background:transparent;padding:0;min-height:100dvh;
  position:relative;overflow:hidden;
}
.film-stage{
  position:relative;width:100%;height:100dvh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.film-slide{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.2s ease;
  pointer-events:none;
}
.film-slide.active{opacity:1;pointer-events:auto}
.film-slide img{
  max-width:88%;max-height:72dvh;
  object-fit:contain;border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(245,200,66,.15);
  animation:kenburns 8s ease-in-out infinite alternate;
}
.film-caption{
  position:absolute;bottom:max(env(safe-area-inset-bottom),3.5rem);
  left:50%;transform:translateX(-50%);
  text-align:center;width:90%;max-width:480px;
}
.film-caption-text{
  font-size:clamp(.88rem,3.5vw,1.05rem); color:rgba(255,255,255,.7);
  text-shadow:0 2px 12px rgba(0,0,0,.8); line-height:1.7;letter-spacing:.05em;
  opacity:0;transform:translateY(12px);
  transition:opacity .8s ease .4s,transform .8s ease .4s;
}
.film-slide.active .film-caption-text{opacity:1;transform:translateY(0)}
.film-dots{display:flex;gap:8px;justify-content:center;margin-top:1rem}
.film-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.25); transition:background .4s,transform .4s;
}
.film-dot.active{background:var(--gold);transform:scale(1.3);box-shadow:0 0 8px rgba(245,200,66,.6)}
.film-title{
  position:absolute;top:max(env(safe-area-inset-top),2.5rem); left:50%;transform:translateX(-50%);
  font-size:clamp(1.1rem,4.5vw,1.5rem);font-weight:700;
  color:var(--gold);letter-spacing:.15em;
  text-shadow:0 0 20px rgba(245,200,66,.5);
  opacity:0;transition:opacity .8s ease; z-index:2;
}
.film-title.visible{opacity:1}
.film-progress{
  position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--amber),var(--gold));
  transition:width .3s linear;z-index:2;
}
.film-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;border-radius:50%;
  border:1.5px solid rgba(245,200,66,.3);
  background:rgba(30,15,45,.5);backdrop-filter:blur(6px);
  color:var(--gold);font-size:1.2rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;z-index:3;
  -webkit-tap-highlight-color:transparent;
}
.film-stage:hover .film-nav{opacity:.7}
.film-nav:hover{opacity:1!important;border-color:var(--gold)}
.film-nav.prev{left:12px}
.film-nav.next{right:12px}

/* §2.7 对话框 + 合并 */
#dialog-section{
  background:transparent;text-align:center;position:relative;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
/* 弹窗 */
.dialog-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);
  z-index:60;min-width:260px;max-width:340px;padding:2.2rem 2.5rem;
  border-radius:24px;text-align:center;
  opacity:0;pointer-events:none;
  transition:opacity .5s ease,transform .5s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 12px 48px rgba(0,0,0,.4);
}
.dialog-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.dialog-popup.hide{opacity:0;transform:translate(-50%,-50%) scale(.85);pointer-events:none}
.dialog-popup-1{background:linear-gradient(135deg,#f8b4b4 0%,#f7d794 100%);border:2px solid rgba(255,255,255,.4)}
.dialog-popup-2{background:linear-gradient(135deg,#f7d794 0%,#f8b4b4 100%);border:2px solid rgba(255,255,255,.4)}
.dialog-popup-3{background:linear-gradient(135deg,#f8b4b4 0%,#e77f67 50%,#f7d794 100%);border:2px solid rgba(255,255,255,.5);min-width:280px}
.dialog-text{font-size:clamp(1.3rem,5vw,1.7rem);font-weight:800;color:#4a2520;letter-spacing:.03em;line-height:1.3}
.dialog-sub{margin-top:.8rem;font-size:clamp(.85rem,3vw,1rem);color:rgba(74,37,32,.7);font-weight:500;letter-spacing:.05em}
/* 合并舞台 */
.merge-stage{
  position:relative;width:100%;max-width:420px;height:280px;margin:0 auto;
  display:flex;align-items:center;justify-content:center;
}
.merge-stage.fixed{
  position:fixed;inset:0;z-index:55;
  width:100%;max-width:none;height:100dvh;
  display:flex;align-items:center;justify-content:center;margin:0;
}
.merge-img{
  position:absolute;top:50%;width:160px;height:160px;
  object-fit:cover;border-radius:14px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);
  border:2px solid rgba(245,200,66,.3);
  opacity:0; transition:all 1.6s cubic-bezier(.25,.46,.45,.94);
}
.merge-img.left{left:calc(50% - 200px);transform:translateY(-50%) scale(.8)}
.merge-img.right{right:calc(50% - 200px);transform:translateY(-50%) scale(.8)}
.merge-img.attract-left{left:calc(50% - 82px);opacity:1;transform:translateY(-50%) scale(.9)}
.merge-img.attract-right{right:calc(50% - 82px);opacity:1;transform:translateY(-50%) scale(.9)}
.merge-img.merged-left{left:calc(50% - 75px);opacity:0;transform:translateY(-50%) scale(.5);filter:blur(4px)}
.merge-img.merged-right{right:calc(50% - 75px);opacity:0;transform:translateY(-50%) scale(.5);filter:blur(4px)}
/* 电流画布 */
.electric-canvas{position:absolute;inset:0;z-index:2;pointer-events:none}
/* We 合并区 */
.we-box{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:3;text-align:center;min-height:160px;min-width:160px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(248,180,180,.15),rgba(247,215,148,.15));
  border:2px solid rgba(245,200,66,.4);border-radius:24px;
  padding:1.5rem 2.5rem;backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(245,200,66,.2),0 8px 32px rgba(0,0,0,.3);
  opacity:0; transition:all .8s cubic-bezier(.34,1.56,.64,1);
}
.we-box.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.we-text-en{
  font-size:clamp(1.8rem,7vw,2.5rem);font-weight:900;
  color:var(--gold);letter-spacing:.08em;
  text-shadow:0 0 20px rgba(245,200,66,.6);
}
.we-text-cn{
  margin-top:.3rem;font-size:clamp(.9rem,3.5vw,1.1rem);
  color:rgba(255,255,255,.6);font-weight:500;letter-spacing:.2em;
}
/* 弹窗光晕粒子 */
.dialog-glow{
  position:absolute;inset:-20px;border-radius:30px;z-index:-1;
  background:radial-gradient(circle,rgba(245,200,66,.2),transparent 70%);
  animation:dialog-glow-pulse 2s ease-in-out infinite;
}
@keyframes dialog-glow-pulse{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.05)}
}

/* §3 信 */
#letter-section{background:transparent}
.letter-wrap{
  width:100%;max-width:480px;
  background:rgba(255,248,238,.06);
  border:1px solid rgba(245,200,66,.2);border-radius:20px;
  padding:2rem 1.5rem;backdrop-filter:blur(8px);min-height:200px;
}
.letter-salutation{font-size:1rem;color:var(--amber);margin-bottom:1.2rem;font-weight:600}
#letter-body{font-size:.95rem;color:rgba(255,255,255,.75);line-height:1.95;white-space:pre-wrap}
#letter-body .cursor{
  display:inline-block;width:2px;height:1.1em;
  background:var(--gold);margin-left:2px;
  vertical-align:text-bottom; animation:blink-cursor .9s step-end infinite;
}
.letter-sign{margin-top:1.5rem;text-align:right;font-size:.9rem;color:var(--amber);opacity:0;transition:opacity .8s}
.letter-sign.show{opacity:1}

/* §4 蛋糕 */
#cake-section{background:transparent;text-align:center;position:relative}
.cake-hint{margin-top:1rem;font-size:.85rem;color:rgba(255,255,255,.4);letter-spacing:.1em;position:relative;z-index:2}
#cake-section .section-title{position:relative;z-index:2}

/* 蛋糕区域容器 */
#cake-area {
  position: relative; width: 100%; max-width: 800px; margin: 0 auto;
  min-height: clamp(380px, 90vw, 560px);
  display: flex; align-items: center; justify-content: center;
}
/* 环绕照片容器 */
.surround-photos { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
/* 环绕照片通用样式 */
.surround-photo {
  position: absolute;
  width: clamp(80px, 17vw, 140px); height: clamp(80px, 17vw, 140px);
  object-fit: cover; border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,.4), 0 0 0 2px rgba(245,200,66,.2);
  border: 2px solid rgba(245,200,66,.3);
  opacity: 0; transform: scale(0.8);
  transition: opacity 0.8s ease, transform 0.8s ease; pointer-events: auto;
}
.surround-photo.visible { opacity: 1; transform: scale(1); }

/* 梯形四个顶点位置参数 */
#sp-1 { left: 7.5%; top: 8%; }
#sp-2 { right: 7.5%; top: 8%; }
#sp-3 { left: 0%; bottom: 15%; }
#sp-4 { right: 0%; bottom: 15%; }

/* 蛋糕容器 */
#cake-wrap{position:relative;display:inline-block;cursor:pointer;touch-action:none;-webkit-tap-highlight-color:transparent;z-index:2;margin: 0 auto}
#cake-img {
  display: block; max-width: clamp(200px, 55vw, 320px); width: 100%; border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
  -webkit-mask-image: radial-gradient(ellipse 85% 80% at center, black 60%, transparent 100%);
  mask-image: radial-gradient(ellipse 85% 80% at center, black 60%, transparent 100%);
}
#cake-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#blow-btn{
  position:relative;z-index:2; margin-top:1.8rem;padding:.75rem 2.2rem;border-radius:50px;
  border:1.5px solid var(--gold);background:rgba(245,200,66,.1);
  color:var(--gold);font-size:.95rem;letter-spacing:.12em;
  cursor:pointer;transition:background .3s,transform .15s;
  -webkit-tap-highlight-color:transparent;
}
#blow-btn:active{transform:scale(.95);background:rgba(245,200,66,.25)}
#blow-btn.hidden{display:none}
#wish-text{
  position:relative;z-index:2; margin-top:2.5rem;
  font-size:clamp(1.1rem,4.5vw,1.5rem);font-weight:700; color:var(--gold);text-align:center;
  opacity:0;transform:scale(.8); transition:opacity .8s,transform .8s;
  text-shadow:0 0 30px rgba(245,200,66,.7);padding:0 1rem;
}
#wish-text.show{opacity:1;transform:scale(1)}
/* 许愿遮罩 */
#wish-overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(5,0,15,.75); opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#wish-overlay.active{opacity:1}
#cake-wrap.wish-glow{
  filter:brightness(1.2) drop-shadow(0 0 60px rgba(255,180,60,.6))
         drop-shadow(0 0 120px rgba(255,120,20,.3));
}
.confetti-piece{
  position:fixed;pointer-events:none;z-index:200;
  border-radius:2px;animation:confetti-fall linear forwards;
}

/* ★ 小彩蛋 */
#easter-egg-wrap{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:150;
  opacity:0;pointer-events:none;cursor:pointer;

(function preloadResources() {
  const loadingScreen = document.getElementById('loading-screen');
  const loadingText = document.getElementById('loading-text');
  const urls = [];
  document.querySelectorAll('img[src]').forEach(img => { if (img.src && !img.src.startsWith('data:')) urls.push(img.src); });
  // 动态添加 splash 背景
  if (CONFIG.cover.splash) urls.push(CONFIG.cover.splash);
  FILM_PHOTOS.forEach(p => { if (p.img) { const a = document.createElement('a'); a.href = p.img; urls.push(a.href); }});
  TIMELINE.forEach(t => { if (t.img) { const a = document.createElement('a'); a.href = t.img; urls.push(a.href); }});
  const uniqueUrls = [...new Set(urls)];
  if (uniqueUrls.length === 0) { loadingScreen.classList.add('hidden'); return; }
  let loaded = 0;
  const total = uniqueUrls.length;
  function finish() { loadingText.textContent = '✦ 加载完成'; setTimeout(() => loadingScreen.classList.add('hidden'), 300); }
  const timeout = setTimeout(finish, 15000);
  uniqueUrls.forEach(url => {
    const img = new Image();
    img.onload = img.onerror = function() { loaded++; if (loaded >= total) { clearTimeout(timeout); finish(); } };
    img.src = url;
  });
})();

let _fadeTimers = [];
function cancelFades() { _fadeTimers.forEach(t => clearTimeout(t)); _fadeTimers = []; }
function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function fadeAudio(audio, from, to, durationMs, cb) {
  if (!audio) { if (cb) cb(); return; }
  audio.volume = from;
  const steps = Math.max(1, Math.ceil(durationMs / 40));
  let i = 0;
  const tid = setInterval(() => {
    i++;
    if (i >= steps) { audio.volume = Math.max(0, Math.min(1, to)); clearInterval(tid); if (cb) cb(); }
    else { const progress = i / steps; const eased = easeInOutCubic(progress); audio.volume = Math.max(0, Math.min(1, from + (to - from) * eased)); }
  }, durationMs / steps);
  _fadeTimers.push(tid);
}

    if(birthdayAudio && !birthdaySongPlayed && !birthdayAudio._loadFailed){
      birthdaySongPlayed = true; birthdayAudio.currentTime = BIRTHDAY_SONG_START; birthdayAudio.volume = 0;
      _fadeTimers.push(setTimeout(() => { birthdayAudio.play().catch(()=>{}); currentAudio = birthdayAudio; fadeAudio(birthdayAudio, 0, SONG_VOL, 3000); }, 1200));
      const fadeOutAt = (BIRTHDAY_SONG_DURATION - 2) * 1000;
      birthdayFadeOutTimer = setTimeout(() => { fadeAudio(birthdayAudio, birthdayAudio.volume, 0, 2000); }, fadeOutAt); _fadeTimers.push(birthdayFadeOutTimer);
      birthdayEndTimer = setTimeout(() => { birthdayAudio.pause(); birthdayAudio.currentTime = BIRTHDAY_SONG_START; birthdayAudio.volume = 0; }, BIRTHDAY_SONG_DURATION * 1000); _fadeTimers.push(birthdayEndTimer);
    }
    blowBtn.textContent = CC.btnWish; document.getElementById('cake-hint').textContent = CC.hintWish;
  } else if(wishStage === 1){
    wishOverlay.classList.add('active'); window.cakeControl.setWishMode(true);
    blowBtn.textContent = CC.btnBlow; document.getElementById('cake-hint').textContent = CC.hintBlow; wishStage = 2;
  } else {
    wishOverlay.classList.remove('active'); window.cakeControl.setWishMode(false); cancelFades();
    if(birthdayAudio && !birthdayAudio.paused) fadeAudio(birthdayAudio, birthdayAudio.volume, 0, 800, () => { birthdayAudio.pause(); birthdayAudio.currentTime = BIRTHDAY_SONG_START; birthdayAudio.volume = 0; });
    if(!bgAudio.paused) fadeAudio(bgAudio, bgAudio.volume, 0, 800, () => { bgAudio.pause(); bgAudio.volume = 0; });
    setTimeout(()=>{ wishText.classList.add('show'); confetti(); },300);
    setTimeout(() => { document.getElementById('easter-egg-wrap').classList.add('show'); }, 7200);
    setTimeout(() => {
      if(hasUserUnlockedMusic){
        if(postWishAudio && !postWishAudio._loadFailed){ postWishAudio.currentTime=0; postWishAudio.volume=0; postWishAudio.play().catch(()=>{}); currentAudio=postWishAudio; fadeAudio(postWishAudio,0,POST_VOL,2000); }
        else if(MUSIC_SRC && !bgAudio._loadFailed){ bgAudio.volume=0; bgAudio.play().catch(()=>{}); currentAudio=bgAudio; fadeAudio(bgAudio,0,BG_VOL,2000); }
      }
    }, 700);
    blowBtn.textContent = CC.btnRelight; document.getElementById('cake-hint').textContent = CC.hintRelight; wishStage = 1;
  }
}
blowBtn.addEventListener('click', toggleWish);
document.getElementById('cake-wrap').addEventListener('click', toggleWish);

// Confetti
function confetti(){
  const colors=['#f5c842','#e8973a','#f4a1a1','#fff0a0','#ffd700','#ff9ff3','#54a0ff'];
  for(let i=0;i<130;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*8+5}px;height:${Math.random()*8+5}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${Math.random()*2+2}s;animation-delay:${Math.random()*1.5}s;`;
    document.body.appendChild(el); el.addEventListener('animationend',()=>el.remove());
  }
}

// 彩蛋
(function(){
  const eggWrap = document.getElementById('easter-egg-wrap'), eggText1 = document.getElementById('egg-text-1'), eggText2 = document.getElementById('egg-text-2');
  let eggClicked = false;
  eggWrap.addEventListener('click', () => {
    if(eggClicked) return; eggClicked = true; eggWrap.classList.add('clicked');
    setTimeout(() => eggText1.classList.add('show'), 300);
    setTimeout(() => eggText1.classList.add('hide'), 2000);
    setTimeout(() => eggText2.classList.add('show'), 3700);
  });
})();
